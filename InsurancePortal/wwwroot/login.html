<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Insurance Portal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header>
        <div class="logo">Greenstone  Insurance Portal</div>
        
    </header>

    <div class="login-container">
        <h2>Login</h2>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>

            <button type="submit" class="btn-primary">Login</button>
        </form>

        <!-- Botão Create Account -->
        <a href="register.html" class="btn-secondary">Create Account</a>

        <p><a href="index.html" class="btn-secondary">Back to Home</a></p>
    </div>

    <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const response = await fetch("https://insuranceportal-production-b15d.up.railway.app/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        if (response.ok) {
            const user = await response.json();
            localStorage.setItem("userFullName", user.fullName);
            localStorage.setItem("userEmail", user.email);
            localStorage.setItem("userId", user.id);
            window.location.href = "/dashboard.html";
        } else {
            alert("Invalid login. Please check your email and password.");
        }
    } catch (error) {
        console.error(error);
        alert("Error connecting to server.");
    }
});


document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const response = await fetch("https://insuranceportal-production-b15d.up.railway.app/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        if (response.ok) {
            const user = await response.json();
            localStorage.setItem("userFullName", user.fullName);
            localStorage.setItem("userEmail", user.email);
            localStorage.setItem("userId", user.id);
            localStorage.setItem("isAdmin", user.isAdmin);

            // Redirecionar baseado no tipo de usuário
            if (user.isAdmin) {
                window.location.href = "/admin-dashboard.html";
            } else {
                window.location.href = "/dashboard.html";
            }
        } else {
            alert("Invalid login. Please check your email and password.");
        }
    } catch (error) {
        console.error(error);
        alert("Error connecting to server.");
    }
});


</script>

</body>
</html>
