<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Greenstone Insurance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
    <div class="logo">Greenstone Insurance Portal</div>
</header>

<div class="login-container">
    <h2 style="color:#1a237e;">Admin Login</h2>

    <form id="adminLoginForm">
        <input type="email" id="email" placeholder="Admin Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn-admin">Login</button>
    </form>

    <p><a href="/index.html" class="btn-secondary">Back to Home</a></p>
</div>

<script>
document.getElementById("adminLoginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const response = await fetch("https://insuranceportal-production-b15d.up.railway.app/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        if (response.ok) {
            const user = await response.json();

            if (user.isAdmin === true) {
                localStorage.setItem("userFullName", user.fullName);
                localStorage.setItem("userEmail", user.email);
                localStorage.setItem("userId", user.id);
                localStorage.setItem("isAdmin", user.isAdmin);
                window.location.href = "/admin-dashboard.html";
            } else {
                alert("Access denied. This login is for administrators only.");
            }
        } else {
            alert("Invalid credentials.");
        }
    } catch (error) {
        console.error(error);
        alert("Error connecting to server.");
    }
});
</script>

</body>
</html>
