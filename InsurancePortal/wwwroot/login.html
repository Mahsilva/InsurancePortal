<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Insurance Portal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>


<header class="header">
        <div class="header-logo">Greenstone <span>Insurance</span></div>
        <nav class="header-nav">
            <a href="/index.html" class="btn" onclick="logout()">Logout</a>
        </nav>
    </header>

    <style>


        :root {
            --green-dark: #1a3a2a;
            --green-mid: #2e7d32;
            --green-light: #4caf50;
            --green-pale: #e8f5e9;
            --gold: #c9a84c;
            --gold-light: #f0d080;
            --white: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-600: #6c757d;
            --gray-900: #1a1a1a;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--green-dark);
            letter-spacing: -0.5px;
        }

        .header-logo span {
            color: var(--gold);
        }

        .header-nav {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        </style>


    <div class="login-container">
        <h2>Login</h2>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>

            <button type="submit" class="btn-primary">Login</button>
        </form>

        <!-- Botão Create Account -->
        <a href="register.html" class="btn-createaccount2">Create Account</a>

        <p><a href="index.html" class="btn-backtohome">Back to Home</a></p>
    </div>

    <script>
    
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const response = await fetch("https://insuranceportal-production-b15d.up.railway.app/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        if (response.ok) {
            const user = await response.json();
            localStorage.setItem("userFullName", user.fullName);
            localStorage.setItem("userEmail", user.email);
            localStorage.setItem("userId", user.id);
            localStorage.setItem("isAdmin", user.isAdmin);

            // Redirecionar baseado no tipo de usuário
            if (user.isAdmin) {
                window.location.href = "/admin-dashboard.html";
            } else {
                window.location.href = "/dashboard.html";
            }
        } else {
            alert("Invalid login. Please check your email and password.");
        }
    } catch (error) {
        console.error(error);
        alert("Error connecting to server.");
    }
});


</script>

</body>
</html>
